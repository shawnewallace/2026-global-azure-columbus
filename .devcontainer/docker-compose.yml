services:
  app:
    image: mcr.microsoft.com/devcontainers/dotnet:10.0
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    environment:
      POSTGRES_CONNECTION_STRING: Host=db;Port=5432;Database=tasklibrary;Username=tasklibrary;Password=tasklibrary_dev
    depends_on:
      db:
        condition: service_healthy
    networks:
      - devnet

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: tasklibrary
      POSTGRES_USER: tasklibrary
      POSTGRES_PASSWORD: tasklibrary_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasklibrary -d tasklibrary"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - devnet

networks:
  devnet:

volumes:
  postgres-data:
